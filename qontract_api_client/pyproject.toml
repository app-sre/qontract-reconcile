[project]
name = "qontract-api-client"
version = "0.1.0"
description = "Auto-generated client for qontract-api"
authors = [{ name = "Red Hat App-SRE Team", email = "sd-app-sre@redhat.com" }]
license = { text = "Apache 2.0" }
requires-python = ">=3.12"
dependencies = ["httpx>=0.28.1", "pydantic>=2.12.0"]

[dependency-groups]
dev = [
    # development and testing tools
    "mypy==1.18.2",
    "pytest==9.0.1",
    "pytest-cov==7.0.0",
    "ruff==0.14.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["qontract_api_client"]
