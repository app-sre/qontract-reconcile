---
apiVersion: template.openshift.io/v1
kind: Template
labels:
  template: qontract-api
metadata:
  name: qontract-api
  annotations:
    description: qontract-api
objects:
  # -------- COMMON CONFIG MAP ----------
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      annotations:
        qontract.recycle: "true"
      labels:
        app.kubernetes.io/name: qontract-api
      name: qontract-api-config
    data:
      QAPI_DEBUG: "${QAPI_DEBUG}"
      QAPI_ROOT_PATH: "${QAPI_ROOT_PATH}"
      QAPI_LOG_LEVEL: "${QAPI_LOG_LEVEL}"
      QAPI_UVICORN_OPTS: "${QAPI_UVICORN_OPTS}"


  # ------- API DEPLOYMENT --------------------
  - apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: qontract-api
    spec:
      minAvailable: 1
      selector:
        matchLabels:
          app.kubernetes.io/component: api

  - apiVersion: v1
    kind: ServiceAccount
    imagePullSecrets: "${{IMAGE_PULL_SECRETS}}"
    metadata:
      name: qontract-api
      labels:
        app.kubernetes.io/component: api
        app.kubernetes.io/name: qontract-api

  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      annotations:
        ignore-check.kube-linter.io/unset-cpu-requirements: "no cpu limits"
      labels:
        app.kubernetes.io/component: api
        app.kubernetes.io/name: qontract-api
      name: qontract-api
    spec:
      replicas: ${{QAPI_API_REPLICAS}}
      selector:
        matchLabels:
          app.kubernetes.io/component: api
          app.kubernetes.io/name: qontract-api
      template:
        metadata:
          labels:
            app.kubernetes.io/component: api
            app.kubernetes.io/name: qontract-api
        spec:
          restartPolicy: Always
          serviceAccountName: qontract-api
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - podAffinityTerm:
                    labelSelector:
                      matchExpressions:
                        - key: app.kubernetes.io/component
                          operator: In
                          values:
                            - api
                    topologyKey: topology.kubernetes.io/zone
                  weight: 100
                - podAffinityTerm:
                    labelSelector:
                      matchExpressions:
                        - key: app.kubernetes.io/component
                          operator: In
                          values:
                            - api
                    topologyKey: kubernetes.io/hostname
                  weight: 1
          containers:
            - env:
                - name: QAPI_START_MODE
                  value: api
                - name: QAPI_APP_PORT
                  value: "${QAPI_APP_PORT}"
                - name: QAPI_OPA__ENABLED
                  value: "${QAPI_OPA_ENABLED}"
                - name: QAPI_OPA__HOST
                  value: "http://localhost:8181"
                - name: QAPI_SENTRY_DSN
                  valueFrom:
                    secretKeyRef:
                      name: ${QAPI_SENTRY_SECRET_NAME}
                      key: dsn
              envFrom:
                - secretRef:
                    name: qontract-api-secret
                    optional: true
                - configMapRef:
                    name: qontract-api-config
                    optional: true
              image: "${IMAGE}:${IMAGE_TAG}"
              name: api
              ports:
                - containerPort: ${{QAPI_APP_PORT}}
              lifecycle:
                preStop:
                  exec:
                    command:
                      - sh
                      - "-c"
                      - sleep 5
              readinessProbe:
                httpGet:
                  path: /health/ready
                  port: ${{QAPI_APP_PORT}}
                periodSeconds: 60
                timeoutSeconds: 10
              livenessProbe:
                httpGet:
                  path: /health/live
                  port: ${{QAPI_APP_PORT}}
                periodSeconds: 15
                timeoutSeconds: 5
              startupProbe:
                tcpSocket:
                  port: ${{QAPI_APP_PORT}}
                initialDelaySeconds: 5
                periodSeconds: 5
                timeoutSeconds: 5
              resources:
                requests:
                  cpu: ${{QAPI_API_CPU_REQUESTS}}
                  memory: ${{QAPI_API_MEMORY_REQUESTS}}
                limits:
                  memory: ${{QAPI_API_MEMORY_LIMITS}}
            # OPA sidecar for parameter-level authorization
            - name: opa
              image: "${OPA_IMAGE}:${OPA_IMAGE_TAG}"
              args:
                - run
                - --ignore=.*
                - --server
                - --log-level=info
                - --disable-telemetry
                - --addr=0.0.0.0:8181
                - --set=decision_logs.console=true
                - --watch
                - /authz
                - /policies
              ports:
                - name: opa
                  containerPort: 8181
              lifecycle:
                preStop:
                  exec:
                    command:
                      - sh
                      - "-c"
                      - sleep 2
              livenessProbe:
                httpGet:
                  path: /health
                  port: 8181
                initialDelaySeconds: 5
                periodSeconds: 60
              readinessProbe:
                httpGet:
                  path: /health?bundle=true
                  port: 8181
                initialDelaySeconds: 5
                periodSeconds: 10
              startupProbe:
                tcpSocket:
                  port: 8181
                initialDelaySeconds: 1
                periodSeconds: 5
                timeoutSeconds: 5
              resources:
                requests:
                  cpu: ${{QAPI_OPA_CPU_REQUESTS}}
                  memory: ${{QAPI_OPA_MEMORY_REQUESTS}}
                limits:
                  memory: ${{QAPI_OPA_MEMORY_LIMITS}}
              volumeMounts:
                - name: opa-policies
                  mountPath: /policies
                  readOnly: true
          volumes:
            - name: opa-policies
              configMap:
                name: qontract-api-opa-policy

  # ---------- API SERVICE -----------
  - apiVersion: v1
    kind: Service
    metadata:
      labels:
        app.kubernetes.io/component: api
        app.kubernetes.io/name: qontract-api
      name: qontract-api
    spec:
      ports:
        - name: "http"
          port: ${{QAPI_APP_PORT}}
          targetPort: ${{QAPI_APP_PORT}}
      selector:
        app.kubernetes.io/component: api
        app.kubernetes.io/name: qontract-api


  # --------- SUBSCRIBER DEPLOYMENT --------------
  - apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: qontract-api-subscriber
    spec:
      minAvailable: 1
      selector:
        matchLabels:
          app.kubernetes.io/component: subscriber

  - apiVersion: v1
    kind: ServiceAccount
    imagePullSecrets: "${{IMAGE_PULL_SECRETS}}"
    metadata:
      name: qontract-api-subscriber
      labels:
        app.kubernetes.io/component: subscriber
        app.kubernetes.io/name: qontract-api

  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      annotations:
        ignore-check.kube-linter.io/unset-cpu-requirements: "no cpu limits"
      labels:
        app.kubernetes.io/component: subscriber
        app.kubernetes.io/name: qontract-api
      name: qontract-api-subscriber
    spec:
      replicas: ${{QAPI_SUBSCRIBER_REPLICAS}}
      selector:
        matchLabels:
          app.kubernetes.io/component: subscriber
          app.kubernetes.io/name: qontract-api
      template:
        metadata:
          labels:
            app.kubernetes.io/component: subscriber
            app.kubernetes.io/name: qontract-api
        spec:
          restartPolicy: Always
          serviceAccountName: qontract-api-subscriber
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - podAffinityTerm:
                    labelSelector:
                      matchExpressions:
                        - key: app.kubernetes.io/component
                          operator: In
                          values:
                            - subscriber
                    topologyKey: topology.kubernetes.io/zone
                  weight: 100
                - podAffinityTerm:
                    labelSelector:
                      matchExpressions:
                        - key: app.kubernetes.io/component
                          operator: In
                          values:
                            - subscriber
                    topologyKey: kubernetes.io/hostname
                  weight: 1
          containers:
            - env:
                - name: QAPI_START_MODE
                  value: subscriber
                - name: QAPI_SUBSCRIBER_METRICS_PORT
                  value: "${QAPI_SUBSCRIBER_METRICS_PORT}"
                - name: QAPI_SENTRY_DSN
                  valueFrom:
                    secretKeyRef:
                      name: ${QAPI_SENTRY_SECRET_NAME}
                      key: dsn
              envFrom:
                - secretRef:
                    name: qontract-api-secret
                    optional: true
                - configMapRef:
                    name: qontract-api-config
                    optional: true
              image: "${IMAGE}:${IMAGE_TAG}"
              name: subscriber
              ports:
                - containerPort: ${{QAPI_SUBSCRIBER_METRICS_PORT}}
              readinessProbe:
                httpGet:
                  path: /health/ready
                  port: ${{QAPI_APP_PORT}}
                periodSeconds: 60
                timeoutSeconds: 5
              livenessProbe:
                httpGet:
                  path: /health/live
                  port: ${{QAPI_APP_PORT}}
                periodSeconds: 15
                timeoutSeconds: 5
              startupProbe:
                tcpSocket:
                  port: ${{QAPI_APP_PORT}}
                initialDelaySeconds: 5
                periodSeconds: 5
                timeoutSeconds: 5
              resources:
                requests:
                  cpu: ${{QAPI_SUBSCRIBER_CPU_REQUESTS}}
                  memory: ${{QAPI_SUBSCRIBER_MEMORY_REQUESTS}}
                limits:
                  memory: ${{QAPI_SUBSCRIBER_MEMORY_LIMITS}}

  # ---------- SUBSCRIBER SERVICE (PROMETHEUS) -----------
  - apiVersion: v1
    kind: Service
    metadata:
      labels:
        app.kubernetes.io/component: subscriber
        app.kubernetes.io/name: qontract-api
      name: qontract-api-subscriber
    spec:
      ports:
        - name: "http"
          port: ${{QAPI_SUBSCRIBER_METRICS_PORT}}
          targetPort: ${{QAPI_SUBSCRIBER_METRICS_PORT}}
      selector:
        app.kubernetes.io/component: subscriber
        app.kubernetes.io/name: qontract-api

  # --------- PROD WORKER DEPLOYMENT --------------
  # Consumes the qontract-api-prod Celery queue (dry_run=False, real writes).
  # Replica count is managed by the qontract-api-worker ScaledObject (KEDA) below.
  - apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: qontract-api-worker
    spec:
      minAvailable: 1
      selector:
        matchLabels:
          app.kubernetes.io/component: worker

  - apiVersion: v1
    kind: ServiceAccount
    imagePullSecrets: "${{IMAGE_PULL_SECRETS}}"
    metadata:
      name: qontract-api-worker
      labels:
        app.kubernetes.io/component: worker
        app.kubernetes.io/name: qontract-api

  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      annotations:
        ignore-check.kube-linter.io/unset-cpu-requirements: "no cpu limits"
      labels:
        app.kubernetes.io/component: worker
        app.kubernetes.io/name: qontract-api
      name: qontract-api-worker
    spec:
      selector:
        matchLabels:
          app.kubernetes.io/component: worker
          app.kubernetes.io/name: qontract-api
      template:
        metadata:
          labels:
            app.kubernetes.io/component: worker
            app.kubernetes.io/name: qontract-api
        spec:
          restartPolicy: Always
          serviceAccountName: qontract-api-worker
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - podAffinityTerm:
                    labelSelector:
                      matchExpressions:
                        - key: app.kubernetes.io/component
                          operator: In
                          values:
                            - worker
                    topologyKey: topology.kubernetes.io/zone
                  weight: 100
                - podAffinityTerm:
                    labelSelector:
                      matchExpressions:
                        - key: app.kubernetes.io/component
                          operator: In
                          values:
                            - worker
                    topologyKey: kubernetes.io/hostname
                  weight: 1
          containers:
            - env:
                - name: QAPI_START_MODE
                  value: worker
                - name: QAPI_CELERY_OPTS
                  value: "${QAPI_WORKER_PROD_CELERY_OPTS}"
                - name: QAPI_WORKER_METRICS_PORT
                  value: "${QAPI_WORKER_METRICS_PORT}"
                - name: QAPI_WORKER_TEMP_DIR
                  value: /worker-temp-dir
                - name: QAPI_SENTRY_DSN
                  valueFrom:
                    secretKeyRef:
                      name: ${QAPI_SENTRY_SECRET_NAME}
                      key: dsn
              envFrom:
                - secretRef:
                    name: qontract-api-secret
                    optional: true
                - configMapRef:
                    name: qontract-api-config
                    optional: true
              image: "${IMAGE}:${IMAGE_TAG}"
              name: worker
              ports:
                - containerPort: ${{QAPI_WORKER_METRICS_PORT}}
              readinessProbe:
                httpGet:
                  path: /metrics
                  port: ${{QAPI_WORKER_METRICS_PORT}}
                periodSeconds: 15
                timeoutSeconds: 5
              startupProbe:
                tcpSocket:
                  port: ${{QAPI_WORKER_METRICS_PORT}}
                initialDelaySeconds: 5
                periodSeconds: 5
                timeoutSeconds: 5
              livenessProbe:
                tcpSocket:
                  port: ${{QAPI_WORKER_METRICS_PORT}}
                periodSeconds: 30
                timeoutSeconds: 5
              resources:
                requests:
                  cpu: ${{QAPI_WORKER_CPU_REQUESTS}}
                  memory: ${{QAPI_WORKER_MEMORY_REQUESTS}}
                limits:
                  memory: ${{QAPI_WORKER_MEMORY_LIMITS}}
              volumeMounts:
                - mountPath: /worker-temp-dir
                  name: worker-temp-dir
          volumes:
            - name: worker-temp-dir
              emptyDir:
                sizeLimit: 50Mi

  # ---------- PROD WORKER SERVICE (PROMETHEUS) -----------
  - apiVersion: v1
    kind: Service
    metadata:
      labels:
        app.kubernetes.io/component: worker
        app.kubernetes.io/name: qontract-api
      name: qontract-api-worker
    spec:
      ports:
        - name: "http"
          port: ${{QAPI_WORKER_METRICS_PORT}}
          targetPort: ${{QAPI_WORKER_METRICS_PORT}}
      selector:
        app.kubernetes.io/component: worker
        app.kubernetes.io/name: qontract-api

  # --------- MR-CHECK WORKER DEPLOYMENT --------------
  # Consumes the qontract-api-mr-check Celery queue (dry_run=True, read-only
  # validation runs). Kept as a separate Deployment + queue so a stuck/blocked
  # prod reconciliation can't starve MR-check validation capacity, or vice versa.
  # Replica count is managed by the qontract-api-worker-mr-check ScaledObject
  # (KEDA) below.
  - apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: qontract-api-worker-mr-check
    spec:
      minAvailable: 1
      selector:
        matchLabels:
          app.kubernetes.io/component: worker-mr-check

  - apiVersion: v1
    kind: ServiceAccount
    imagePullSecrets: "${{IMAGE_PULL_SECRETS}}"
    metadata:
      name: qontract-api-worker-mr-check
      labels:
        app.kubernetes.io/component: worker-mr-check
        app.kubernetes.io/name: qontract-api

  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      annotations:
        ignore-check.kube-linter.io/unset-cpu-requirements: "no cpu limits"
      labels:
        app.kubernetes.io/component: worker-mr-check
        app.kubernetes.io/name: qontract-api
      name: qontract-api-worker-mr-check
    spec:
      selector:
        matchLabels:
          app.kubernetes.io/component: worker-mr-check
          app.kubernetes.io/name: qontract-api
      template:
        metadata:
          labels:
            app.kubernetes.io/component: worker-mr-check
            app.kubernetes.io/name: qontract-api
        spec:
          restartPolicy: Always
          serviceAccountName: qontract-api-worker-mr-check
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - podAffinityTerm:
                    labelSelector:
                      matchExpressions:
                        - key: app.kubernetes.io/component
                          operator: In
                          values:
                            - worker-mr-check
                    topologyKey: topology.kubernetes.io/zone
                  weight: 100
                - podAffinityTerm:
                    labelSelector:
                      matchExpressions:
                        - key: app.kubernetes.io/component
                          operator: In
                          values:
                            - worker-mr-check
                    topologyKey: kubernetes.io/hostname
                  weight: 1
          containers:
            - env:
                - name: QAPI_START_MODE
                  value: worker
                - name: QAPI_CELERY_OPTS
                  value: "${QAPI_WORKER_MR_CHECK_CELERY_OPTS}"
                - name: QAPI_WORKER_METRICS_PORT
                  value: "${QAPI_WORKER_METRICS_PORT}"
                - name: QAPI_WORKER_TEMP_DIR
                  value: /worker-temp-dir
                - name: QAPI_SENTRY_DSN
                  valueFrom:
                    secretKeyRef:
                      name: ${QAPI_SENTRY_SECRET_NAME}
                      key: dsn
              envFrom:
                - secretRef:
                    name: qontract-api-secret
                    optional: true
                - configMapRef:
                    name: qontract-api-config
                    optional: true
              image: "${IMAGE}:${IMAGE_TAG}"
              name: worker-mr-check
              ports:
                - containerPort: ${{QAPI_WORKER_METRICS_PORT}}
              readinessProbe:
                httpGet:
                  path: /metrics
                  port: ${{QAPI_WORKER_METRICS_PORT}}
                periodSeconds: 15
                timeoutSeconds: 5
              startupProbe:
                tcpSocket:
                  port: ${{QAPI_WORKER_METRICS_PORT}}
                initialDelaySeconds: 5
                periodSeconds: 5
                timeoutSeconds: 5
              livenessProbe:
                tcpSocket:
                  port: ${{QAPI_WORKER_METRICS_PORT}}
                periodSeconds: 30
                timeoutSeconds: 5
              resources:
                requests:
                  cpu: ${{QAPI_WORKER_MR_CHECK_CPU_REQUESTS}}
                  memory: ${{QAPI_WORKER_MR_CHECK_MEMORY_REQUESTS}}
                limits:
                  memory: ${{QAPI_WORKER_MR_CHECK_MEMORY_LIMITS}}
              volumeMounts:
                - mountPath: /worker-temp-dir
                  name: worker-temp-dir
          volumes:
            - name: worker-temp-dir
              emptyDir:
                sizeLimit: 50Mi

  # ---------- MR-CHECK WORKER SERVICE (PROMETHEUS) -----------
  - apiVersion: v1
    kind: Service
    metadata:
      labels:
        app.kubernetes.io/component: worker-mr-check
        app.kubernetes.io/name: qontract-api
      name: qontract-api-worker-mr-check
    spec:
      ports:
        - name: "http"
          port: ${{QAPI_WORKER_METRICS_PORT}}
          targetPort: ${{QAPI_WORKER_METRICS_PORT}}
      selector:
        app.kubernetes.io/component: worker-mr-check
        app.kubernetes.io/name: qontract-api

  # ---------- KEDA AUTOSCALING (APPSRE-14860) -----------
  # Scales each worker Deployment on the backlog (list length) of its Celery
  # queue in the Redis/Valkey broker, instead of a fixed replica count. This
  # ensures a stuck task (e.g. an unreachable OpenShift cluster) doesn't just
  # serialize behind a fixed pod count - extra pods spin up to drain the
  # backlog. Queue names below must match QUEUE_PROD/QUEUE_MR_CHECK in
  # qontract_api/qontract_api/tasks/__init__.py.
  - apiVersion: keda.sh/v1alpha1
    kind: TriggerAuthentication
    metadata:
      name: qontract-api-worker-redis-auth
    spec:
      secretTargetRef:
        - parameter: address
          name: qontract-api-secret
          key: KEDA_REDIS_ADDRESS
        - parameter: password
          name: qontract-api-secret
          key: KEDA_REDIS_PASSWORD

  - apiVersion: keda.sh/v1alpha1
    kind: ScaledObject
    metadata:
      name: qontract-api-worker
    spec:
      scaleTargetRef:
        name: qontract-api-worker
      minReplicaCount: ${{QAPI_WORKER_PROD_MIN_REPLICAS}}
      maxReplicaCount: ${{QAPI_WORKER_PROD_MAX_REPLICAS}}
      triggers:
        - type: redis
          metadata:
            listName: qontract-api-prod
            listLength: "${QAPI_WORKER_PROD_QUEUE_TARGET_LENGTH}"
            databaseIndex: "0"
            enableTLS: "true"
          authenticationRef:
            name: qontract-api-worker-redis-auth

  - apiVersion: keda.sh/v1alpha1
    kind: ScaledObject
    metadata:
      name: qontract-api-worker-mr-check
    spec:
      scaleTargetRef:
        name: qontract-api-worker-mr-check
      minReplicaCount: ${{QAPI_WORKER_MR_CHECK_MIN_REPLICAS}}
      maxReplicaCount: ${{QAPI_WORKER_MR_CHECK_MAX_REPLICAS}}
      triggers:
        - type: redis
          metadata:
            listName: qontract-api-mr-check
            listLength: "${QAPI_WORKER_MR_CHECK_QUEUE_TARGET_LENGTH}"
            databaseIndex: "0"
            enableTLS: "true"
          authenticationRef:
            name: qontract-api-worker-redis-auth

parameters:
  # Global config
  - name: IMAGE
    description: Image to use for qontract-api
    # yamllint disable-line rule:line-length
    value: "quay.io/redhat-services-prod/app-sre-tenant/qontract-reconcile-master/qontract-api-master"
    required: true

  - name: IMAGE_PULL_SECRETS
    description: Pull secrets to use for qontract-api images
    value: '[]'
    required: false

  - name: IMAGE_TAG
    description: qontract-api version
    value: "latest"
    required: true

  # Api config
  - name: QAPI_APP_PORT
    description: Port to expose the API app on
    value: "8080"
    required: true

  - name: QAPI_UVICORN_OPTS
    description: Uvicorn options

  - name: QAPI_DEBUG
    description: Debug mode
    value: "0"
    required: true

  - name: QAPI_ROOT_PATH
    description: Root path for the API

  - name: QAPI_LOG_LEVEL
    description: Logging level
    value: "INFO"
    required: true

  - name: QAPI_SENTRY_SECRET_NAME
    description: Name of the secret containing the Sentry DSN
    value: "app-interface-prod-dsn"
    required: true

  ## Api Pod limits
  - name: QAPI_API_REPLICAS
    description: Web replicas
    value: "3"
    required: true

  - name: QAPI_API_MEMORY_REQUESTS
    description: Web memory requests
    value: "200Mi"
    required: true

  - name: QAPI_API_MEMORY_LIMITS
    description: Web memory limits
    value: "200Mi"
    required: true

  - name: QAPI_API_CPU_REQUESTS
    description: Web cpu requests
    value: "100m"
    required: true

  # Subscriber config
  - name: QAPI_SUBSCRIBER_METRICS_PORT
    description: Port to expose the web app on
    value: "8080"
    required: true

  ## Subscriber Pod limits
  - name: QAPI_SUBSCRIBER_REPLICAS
    description: Subscriber replicas
    value: "3"
    required: true

  - name: QAPI_SUBSCRIBER_MEMORY_REQUESTS
    description: Subscriber memory requests
    value: "200Mi"
    required: true

  - name: QAPI_SUBSCRIBER_MEMORY_LIMITS
    description: Subscriber memory limits
    value: "200Mi"
    required: true

  - name: QAPI_SUBSCRIBER_CPU_REQUESTS
    description: Subscriber cpu requests
    value: "100m"
    required: true

  # Worker config (shared by both prod and mr-check worker deployments)
  - name: QAPI_WORKER_METRICS_PORT
    description: Port to expose the web app on
    value: "8000"
    required: true

  ## Prod worker (qontract-api-prod queue) Pod limits
  # The -Q queue name must match QUEUE_PROD in
  # qontract_api/qontract_api/tasks/__init__.py.
  - name: QAPI_WORKER_PROD_CELERY_OPTS
    description: Celery options for the prod worker (binds it to the prod queue)
    value: "--pool solo -Q qontract-api-prod"
    required: true

  - name: QAPI_WORKER_MEMORY_REQUESTS
    description: Prod worker memory requests
    value: "200Mi"
    required: true

  - name: QAPI_WORKER_MEMORY_LIMITS
    description: Prod worker memory limits
    value: "200Mi"
    required: true

  - name: QAPI_WORKER_CPU_REQUESTS
    description: Prod worker cpu requests
    value: "100m"
    required: true

  ## MR-check worker (qontract-api-mr-check queue) Pod limits
  # The -Q queue name must match QUEUE_MR_CHECK in
  # qontract_api/qontract_api/tasks/__init__.py.
  - name: QAPI_WORKER_MR_CHECK_CELERY_OPTS
    description: Celery options for the mr-check worker (binds it to the mr-check queue)
    value: "--pool solo -Q qontract-api-mr-check"
    required: true

  - name: QAPI_WORKER_MR_CHECK_MEMORY_REQUESTS
    description: MR-check worker memory requests
    value: "200Mi"
    required: true

  - name: QAPI_WORKER_MR_CHECK_MEMORY_LIMITS
    description: MR-check worker memory limits
    value: "200Mi"
    required: true

  - name: QAPI_WORKER_MR_CHECK_CPU_REQUESTS
    description: MR-check worker cpu requests
    value: "100m"
    required: true

  ## KEDA autoscaling (APPSRE-14860)
  - name: QAPI_WORKER_PROD_MIN_REPLICAS
    description: Minimum prod worker replicas
    value: "3"
    required: true

  - name: QAPI_WORKER_PROD_MAX_REPLICAS
    description: Maximum prod worker replicas
    value: "15"
